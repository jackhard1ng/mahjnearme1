<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1493" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF69B4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFF0"/>
      <stop offset="100%" stop-color="#F5F5DC"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative mahjong tiles in background -->
  <text x="100" y="100" font-size="60" opacity="0.15">🀇</text>
  <text x="300" y="80" font-size="60" opacity="0.1">🀄</text>
  <text x="900" y="120" font-size="60" opacity="0.12">🀙</text>
  <text x="1050" y="90" font-size="60" opacity="0.1">🀇</text>
  <text x="150" y="550" font-size="60" opacity="0.1">🀙</text>
  <text x="1000" y="570" font-size="60" opacity="0.12">🀄</text>

  <!-- Logo tiles -->
  <g transform="translate(270, 160)">
    <!-- M -->
    <rect x="0" y="2" width="52" height="68" rx="8" fill="#87CEEB"/>
    <rect x="0" y="0" width="52" height="68" rx="8" fill="url(#tile)"/>
    <text x="26" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">M</text>
    <!-- a -->
    <rect x="58" y="2" width="44" height="68" rx="8" fill="#87CEEB"/>
    <rect x="58" y="0" width="44" height="68" rx="8" fill="url(#tile)"/>
    <text x="80" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">a</text>
    <!-- h -->
    <rect x="108" y="2" width="44" height="68" rx="8" fill="#87CEEB"/>
    <rect x="108" y="0" width="44" height="68" rx="8" fill="url(#tile)"/>
    <text x="130" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">h</text>
    <!-- j -->
    <rect x="158" y="2" width="36" height="68" rx="8" fill="#87CEEB"/>
    <rect x="158" y="0" width="36" height="68" rx="8" fill="url(#tile)"/>
    <text x="176" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">j</text>
    <!-- N -->
    <rect x="206" y="2" width="52" height="68" rx="8" fill="#87CEEB"/>
    <rect x="206" y="0" width="52" height="68" rx="8" fill="url(#tile)"/>
    <text x="232" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">N</text>
    <!-- e -->
    <rect x="264" y="2" width="44" height="68" rx="8" fill="#87CEEB"/>
    <rect x="264" y="0" width="44" height="68" rx="8" fill="url(#tile)"/>
    <text x="286" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">e</text>
    <!-- a -->
    <rect x="314" y="2" width="44" height="68" rx="8" fill="#87CEEB"/>
    <rect x="314" y="0" width="44" height="68" rx="8" fill="url(#tile)"/>
    <text x="336" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">a</text>
    <!-- r -->
    <rect x="364" y="2" width="38" height="68" rx="8" fill="#87CEEB"/>
    <rect x="364" y="0" width="38" height="68" rx="8" fill="url(#tile)"/>
    <text x="383" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">r</text>
    <!-- M -->
    <rect x="408" y="2" width="52" height="68" rx="8" fill="#87CEEB"/>
    <rect x="408" y="0" width="52" height="68" rx="8" fill="url(#tile)"/>
    <text x="434" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">M</text>
    <!-- e -->
    <rect x="466" y="2" width="44" height="68" rx="8" fill="#87CEEB"/>
    <rect x="466" y="0" width="44" height="68" rx="8" fill="url(#tile)"/>
    <text x="488" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#4CAF50">e</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="white" opacity="0.95">
    Find Mahjong Games Anywhere You Go
  </text>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="white" opacity="0.8">
    The only directory of pickup mahjong games across the US
  </text>

  <!-- Stats bar -->
  <rect x="300" y="420" width="600" height="50" rx="25" fill="white" opacity="0.2"/>
  <text x="600" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="white">
    2,000+ games  |  50 states  |  600+ cities
  </text>

  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="white" opacity="0.7">
    mahjnearme.com
  </text>
</svg>
